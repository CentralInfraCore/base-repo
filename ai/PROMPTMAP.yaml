version: 1
sprint: renovate-vault-signing
branch: d/feature-003

entries:

  - task: "renovate-scaffold"
    status: todo
    priority: 1
    prompt: |
      Hozd létre a `docker/renovate/` könyvtárstruktúrát a base-repo-ban.
      Olvasd fel előbb: `ai/SYSTEM_CONTEXT.md`, `tools/git_hook_commit-msg.sh`, `docker-compose.yml`.

      Ellenőrizd, hogy a `renovate/renovate` base image (Debian-alapú) tartalmazza-e
      a `curl`, `jq`, `openssl` eszközöket. Ha nem, az apt install sort add a Dockerfile-ba.

      Hozd létre:
      - `docker/renovate/Dockerfile` — `FROM renovate/renovate:latest`, deps ellenőrzés,
        `/hooks/` könyvtár, `git config --global core.hooksPath /hooks/` build lépésként,
        `COPY commit-msg-hook.sh /hooks/commit-msg`, `RUN chmod +x /hooks/commit-msg`,
        `ENTRYPOINT ["/entrypoint.sh"]`
      - Üres placeholderek: `commit-msg-hook.sh`, `entrypoint.sh`, `config.js`, `docker-compose.yml`

      Ne implementáld a fájlok tartalmát — csak a scaffold és a Dockerfile.
    tests:
      - docker/renovate/Dockerfile
    accept: docker build -f docker/renovate/Dockerfile docker/renovate/ --no-cache

  - task: "renovate-commit-hook"
    status: todo
    priority: 2
    prompt: |
      Implementáld a `docker/renovate/commit-msg-hook.sh` fájlt.
      Forrás: `tools/git_hook_commit-msg.sh` — a logika azonos, csak a Vault default értékek mások.

      Változtatások a container kontextushoz:
      - `VAULT_ADDR` default: `https://host.docker.internal:18200` (nem `127.0.0.1`)
      - `VAULT_TOKEN_FILE` default: `/var/run/secrets/vault-token`
      - `VAULT_CA_CERT_FILE` default: `/var/run/secrets/vault-ca.crt`
      - `KEY_NAME` default: `cic-my-sign-key` (változatlan, de env-ből is beolvasható: `${CIC_VAULT_KEY_NAME:-cic-my-sign-key}`)

      A signing formátum (`[signing-metadata]` + `[certificate]` blokk) byte-szinten egyezzen
      a `tools/git_hook_commit-msg.sh` kimenetével. Ne módosítsd.

      Fejléc: `#!/usr/bin/env bash` + `set -euo pipefail`
    tests:
      - docker/renovate/commit-msg-hook.sh
    accept: bash -n docker/renovate/commit-msg-hook.sh

  - task: "renovate-entrypoint"
    status: todo
    priority: 3
    prompt: |
      Implementáld a `docker/renovate/entrypoint.sh` fájlt.

      Feladatai:
      1. Ellenőrizd, hogy `/var/run/secrets/vault-token` létezik — ha nem, `echo "[!] Vault token not found" && exit 1`
      2. `export VAULT_TOKEN=$(cat /var/run/secrets/vault-token)`
      3. `export VAULT_ADDR="${VAULT_ADDR:-https://host.docker.internal:18200}"`
      4. `export CIC_VAULT_TOKEN_FILE="/var/run/secrets/vault-token"`
      5. `export CIC_VAULT_CA_FILE="/var/run/secrets/vault-ca.crt"`
      6. `exec renovate "$@"`

      Fejléc: `#!/usr/bin/env bash` + `set -euo pipefail`
    tests:
      - docker/renovate/entrypoint.sh
    accept: bash -n docker/renovate/entrypoint.sh

  - task: "renovate-config"
    status: todo
    priority: 4
    prompt: |
      Implementáld a `docker/renovate/config.js` self-hosted Renovate konfigurációt.

      Kötelező mezők:
      - `platform: 'github'`
      - `token: process.env.RENOVATE_TOKEN`
      - `repositories`: `process.env.RENOVATE_REPOSITORIES` értékét parsold vesszővel elválasztott
        listaként: `(process.env.RENOVATE_REPOSITORIES || '').split(',').filter(Boolean)`
      - `gitAuthor`: `process.env.RENOVATE_GIT_AUTHOR || 'Renovate Bot <renovate@centralinfracore.hu>'`
      - `onboarding: false`
      - `requireConfig: 'optional'`
      - `dryRun: process.env.RENOVATE_DRY_RUN || null`

      Ne használj hosted preset-et (`config:base` helyett explicit szabályok).
      A fájl CommonJS module legyen: `module.exports = { ... }`
    tests:
      - docker/renovate/config.js
    accept: node -e "require('./docker/renovate/config.js')"

  - task: "renovate-compose"
    status: todo
    priority: 5
    prompt: |
      Hozd létre a `docker/renovate/docker-compose.yml` fájlt.
      Olvasd fel előbb a gyökér `docker-compose.yml`-t a konvenciókhoz.

      Service neve: `renovate`
      Image: a helyi `docker/renovate/Dockerfile`-ból build-elve (context: `docker/renovate`)
      Kötelező beállítások:
      - `extra_hosts: ["host.docker.internal:host-gateway"]` — Linux Vault elérés
      - Bind mountok (read-only):
          - `${XDG_RUNTIME_DIR}/vault/sign-token:/var/run/secrets/vault-token:ro`
          - `${XDG_RUNTIME_DIR}/vault/server.crt:/var/run/secrets/vault-ca.crt:ro`
      - Env változók: `RENOVATE_TOKEN`, `RENOVATE_REPOSITORIES`, `RENOVATE_GIT_AUTHOR`,
        `RENOVATE_DRY_RUN` — mind `.env` fájlból vagy környezetből
      - `env_file: [.env]` — opcionális, ha létezik

      Ne legyen `version:` kulcs (elavult).
    tests:
      - docker/renovate/docker-compose.yml
    accept: docker compose -f docker/renovate/docker-compose.yml config

  - task: "renovate-makefile"
    status: todo
    priority: 6
    prompt: |
      Adj hozzá `renovate.run` és `renovate.build` targeteket a `mk/infra.mk` fájlhoz.
      Olvasd fel előbb az `mk/infra.mk` meglévő konvencióit (target formátum, ##komment).

      ```makefile
      infra.renovate.build: ##infra.renovate.build — Build the custom Renovate Docker image
          docker compose -f docker/renovate/docker-compose.yml build

      infra.renovate.run: ##infra.renovate.run — Run Renovate (set RENOVATE_TOKEN and RENOVATE_REPOSITORIES)
          docker compose -f docker/renovate/docker-compose.yml run --rm renovate
      ```

      A `Makefile`-ban adj hozzá aliasokat:
      ```makefile
      renovate.build: infra.renovate.build
      renovate.run: infra.renovate.run
      ```
    tests:
      - mk/infra.mk
      - Makefile
    accept: make help | grep renovate

  - task: "renovate-integration-test"
    status: todo
    priority: 7
    prompt: |
      Ellenőrizd a teljes Renovate signing flow-t dry-run módban.

      Előfeltétel: a Vault agent fut (`./tools/vault-sign-agent.sh ...`).

      Tesztelési lépések:
      1. `make renovate.build` — image build sikeresen lefut
      2. `RENOVATE_DRY_RUN=full RENOVATE_TOKEN=<pat> RENOVATE_REPOSITORIES=CentralInfraCore/base-repo make renovate.run`
      3. A container logban megjelenik a `[*] Commit message updated with signing metadata.` sor
         (vagy ha nincs PR, akkor a hook nem triggerelődik — ez is elfogadható)
      4. `make test` — változatlanul zöld

      Dokumentáld az eredményt a `ai/ROADMAP.md` M2 milestone DoD pontjaiban.
    tests:
      - make test
    accept: make test